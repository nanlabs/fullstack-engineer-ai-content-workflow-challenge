services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: acme
      POSTGRES_PASSWORD: acme_pass
      POSTGRES_DB: acme_content
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U acme -d acme_content']
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://acme:acme_pass@postgres:5432/acme_content
      FRONTEND_URL: http://localhost:8080
    volumes:
      - ./backend:/app
      - backend_modules:/app/node_modules
    command: sh -c "npx prisma generate && npx prisma migrate deploy && npm run start:dev"

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - '8080:80'
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 80"
    environment:
      API_URL: http://backend:3000

volumes:
  pgdata:
  backend_modules:
  frontend_modules:
