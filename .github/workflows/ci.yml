name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend – lint, typecheck & test
    runs-on: ubuntu-latest
    # Unit tests mock all external deps; these env vars satisfy Prisma generate
    # and any ConfigService reads without a real database or API keys.
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      DEFAULT_LLM_PROVIDER: gemini-flash-2.5
      GOOGLE_API_KEY: ci-placeholder
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: backend

      - name: Lint
        run: npm run lint
        working-directory: backend

      - name: Typecheck
        run: npm run typecheck
        working-directory: backend

      - name: Unit tests
        run: npm test -- --no-coverage
        working-directory: backend

  frontend:
    name: Frontend – lint, typecheck, test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Typecheck
        run: npm run typecheck
        working-directory: frontend

      - name: Unit tests
        run: npm test
        working-directory: frontend

      - name: Production build
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: /api
