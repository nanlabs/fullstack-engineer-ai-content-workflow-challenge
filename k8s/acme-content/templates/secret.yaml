apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-backend-secret
  labels:
    {{- include "acme.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.backend.jwtSecret | quote }}
  OPENAI_API_KEY: {{ .Values.apiKeys.openai | quote }}
  ANTHROPIC_API_KEY: {{ .Values.apiKeys.anthropic | quote }}
  GOOGLE_API_KEY: {{ .Values.apiKeys.google | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
