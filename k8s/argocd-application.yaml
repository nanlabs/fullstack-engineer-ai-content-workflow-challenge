apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: acme-content-workflow
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/acme-content-workflow
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: acme-content-workflow
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
