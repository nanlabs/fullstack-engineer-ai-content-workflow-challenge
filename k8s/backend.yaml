apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: acme-content-workflow
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
        - name: prisma-migrate
          image: acme-content-workflow-backend:latest
          command:
            - npx
            - prisma
            - db
            - push
            - --skip-generate
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: acme-secrets
                  key: DATABASE_URL
      containers:
        - name: backend
          image: acme-content-workflow-backend:latest
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: acme-config
            - secretRef:
                name: acme-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: acme-content-workflow
  labels:
    app: backend
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - port: 4000
      targetPort: 4000
