services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: content-workflow-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: content_workflow
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_EVENTS_CHANNEL: content-workflow-events
      SEED_ON_BOOT: true
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: content-workflow-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://backend:3000
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: content-workflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: content_workflow
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d content_workflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: content-workflow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
