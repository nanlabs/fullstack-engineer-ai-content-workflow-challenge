services:
  postgres:
    image: postgres:15
    container_name: acme_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-acme_content}
      POSTGRES_USER: ${POSTGRES_USER:-acme_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-acme_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-acme_user} -d ${POSTGRES_DB:-acme_content}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: acme_backend
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL:-postgresql://acme_user:acme_password@postgres:5432/acme_content}
      PORT: ${BACKEND_PORT:-4000}
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: acme_frontend
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      VITE_API_URL: ${VITE_API_URL:-http://localhost:${BACKEND_PORT:-4000}}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
