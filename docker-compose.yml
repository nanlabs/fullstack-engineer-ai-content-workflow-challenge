services:
  postgres:
    image: postgres:16-alpine
    container_name: content-workflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: content_workflow
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d content_workflow"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
